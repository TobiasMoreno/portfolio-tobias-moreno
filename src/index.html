<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tobias Moreno — Backend & Product Engineer</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FOUC prevention: apply dark class before Angular bootstraps -->
  <script>
    (function () {
      var t = localStorage.getItem('tm-theme') || 'system';
      var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>

  <!-- SEO -->
  <meta name="description" content="Backend Engineer & Product Engineer based in Córdoba, Argentina. I build REST APIs, microservices, and integrations in fintech environments — focused on system design, user impact, and real outcomes." />

  <!-- Open Graph -->
  <meta property="og:title" content="Tobias Moreno — Backend & Product Engineer" />
  <meta property="og:description" content="Backend Engineer & Product Engineer based in Córdoba, Argentina. REST APIs, microservices, and integrations — focused on system design and real outcomes." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tobiasmoreno.dev" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Tobias Moreno — Backend & Product Engineer" />
  <meta name="twitter:description" content="Backend Engineer & Product Engineer based in Córdoba, Argentina." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

  <!-- Favicon: light mode → logo-light (black bg), dark mode → logo-dark (white on transparent) -->
  <link rel="icon" type="image/jpeg" href="assets/img/logo-light.jpg" />
  <link rel="icon" type="image/png" media="(prefers-color-scheme: dark)" href="assets/img/logo-dark.png" />
</head>
<body>
  <app-root></app-root>
</body>
</html>
